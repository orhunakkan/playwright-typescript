name: 'Send Playwright Test Report'
description: >
  Reads playwright-report/test-results.json, computes pass/fail counts,
  and e-mails a formatted summary via SMTP.
  Pass informational: 'true' for suites (e.g. a11y) where the tested
  site is not owned — failures are downgraded to ⚠️ VIOLATIONS FOUND
  instead of ❌ FAILURE so the pipeline stays green.

inputs:
  suite:
    description: 'Label shown in the email subject, e.g. "Desktop E2E"'
    required: true
  smtp_server:
    required: true
  smtp_port:
    required: true
  email:
    required: true
  password:
    required: true
  run_url:
    description: 'Full URL to this GitHub Actions run'
    required: true
  repo:
    description: 'Full URL to the repository (github.server_url/github.repository)'
    required: true
  trigger:
    description: 'Event that triggered the workflow (github.event_name)'
    required: false
    default: ''
  branch:
    description: 'Branch or ref name (github.ref_name)'
    required: false
    default: ''
  e2e_url:
    description: 'E2E base URL — included in the Environment section when non-empty'
    required: false
    default: ''
  api_url:
    description: 'API base URL — included in the Environment section when non-empty'
    required: false
    default: ''
  informational:
    description: 'Set "true" to treat failures as warnings instead of errors'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Parse test-results.json and build email sections
      id: stats
      shell: bash
      run: |
        FILE="playwright-report/test-results.json"
        if [ -f "$FILE" ]; then
          TOTAL=$(jq  '.stats | .expected + .skipped + .unexpected + .flaky' "$FILE" || echo 0)
          PASSED=$(jq '.stats.expected'   "$FILE" || echo 0)
          FAILED=$(jq '.stats.unexpected' "$FILE" || echo 0)
          SKIPPED=$(jq '.stats.skipped'  "$FILE" || echo 0)
          FLAKY=$(jq  '.stats.flaky'     "$FILE" || echo 0)

          # Guard against jq returning null
          : "${TOTAL:=0}" "${PASSED:=0}" "${FAILED:=0}" "${SKIPPED:=0}" "${FLAKY:=0}"

          if [ "$FAILED" -eq 0 ]; then
            EMOJI="✅"; PREFIX="SUCCESS"
          elif [ "${{ inputs.informational }}" = "true" ]; then
            EMOJI="⚠️"; PREFIX="VIOLATIONS FOUND"
          else
            EMOJI="❌"; PREFIX="FAILURE"
          fi
        else
          # JSON file missing entirely — likely a setup failure before tests ran
          TOTAL=0; PASSED=0; FAILED=0; SKIPPED=0; FLAKY=0
          EMOJI="⚠️"; PREFIX="ERROR"
        fi

        # ── Environment section ───────────────────────────────────────────────
        # Built in bash with real $'\n' — format('\n...') in GHA expressions
        # outputs a literal backslash-n, not a newline character.
        E2E="${{ inputs.e2e_url }}"
        API="${{ inputs.api_url }}"
        ENV_BLOCK=""
        if [ -n "$E2E" ] || [ -n "$API" ]; then
          ENV_BLOCK="Environment"$'\n'"────────────────────────────────"$'\n'
          [ -n "$E2E" ] && ENV_BLOCK="${ENV_BLOCK}E2E: ${E2E}"$'\n'
          [ -n "$API" ] && ENV_BLOCK="${ENV_BLOCK}API: ${API}"$'\n'
        fi

        {
          echo "total=$TOTAL"
          echo "passed=$PASSED"
          echo "failed=$FAILED"
          echo "skipped=$SKIPPED"
          echo "flaky=$FLAKY"
          echo "emoji=$EMOJI"
          echo "prefix=$PREFIX"
          # Multiline output — value contains real newlines, safe to inline in body
          echo "env_block<<__BLOCK_END__"
          printf '%s' "$ENV_BLOCK"
          echo "__BLOCK_END__"
        } >> "$GITHUB_OUTPUT"

    - name: Send report email
      uses: dawidd6/action-send-mail@v16
      with:
        server_address: ${{ inputs.smtp_server }}
        server_port:    ${{ inputs.smtp_port }}
        username:       ${{ inputs.email }}
        password:       ${{ inputs.password }}
        to:             ${{ inputs.email }}
        from:           ${{ inputs.email }}
        subject: '${{ steps.stats.outputs.prefix }}: Playwright ${{ inputs.suite }} Test Report'
        body: |
          ${{ steps.stats.outputs.emoji }} ${{ inputs.suite }} — ${{ inputs.repo }}

          Trigger: ${{ inputs.trigger }} (${{ inputs.branch }})

          Results
          ────────────────────────────────
          Total:    ${{ steps.stats.outputs.total }}
          Passed:   ${{ steps.stats.outputs.passed }}
          Failed:   ${{ steps.stats.outputs.failed }}
          Skipped:  ${{ steps.stats.outputs.skipped }}
          Flaky:    ${{ steps.stats.outputs.flaky }}

          ${{ steps.stats.outputs.env_block }}
          View run: ${{ inputs.run_url }}
          Artifacts (screenshots, traces, videos) are in the run above.

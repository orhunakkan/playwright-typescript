name: Playwright Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment URL to test'
        required: false
        default: 'https://bonigarcia.dev/selenium-webdriver-java'
        type: string
      api_url:
        description: 'API URL to test'
        required: false
        default: 'https://practice.expandtesting.com/notes/api'
        type: string
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      api_url:
        required: false
        type: string

env:
  PRACTICE_E2E_URL: ${{ inputs.environment || 'https://bonigarcia.dev/selenium-webdriver-java' }}
  PRACTICE_API_URL: ${{ inputs.api_url || 'https://practice.expandtesting.com/notes/api' }}
  PLAYWRIGHT_JSON_OUTPUT_FILE: ./playwright-report/test-results.json

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps
      - name: Install Playwright system deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps
      - name: Run Playwright tests for ${{ inputs.environment || 'https://bonigarcia.dev/selenium-webdriver-java' }}
        run: npx playwright test --grep-invert "visual regression"
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            playwright-report/
          retention-days: 30

      # Email reporting directly from JSON output using direct calculations
      - name: Generate test statistics
        id: get-test-stats
        if: ${{ !cancelled() }}
        run: |
          if [ -f "playwright-report/test-results.json" ]; then
            TOTAL_COUNT=$(jq '.stats | .expected + .skipped + .unexpected + .flaky' playwright-report/test-results.json || echo "0")
            PASSED_COUNT=$(jq '.stats.expected' playwright-report/test-results.json || echo "0")
            FAILED_COUNT=$(jq '.stats.unexpected' playwright-report/test-results.json || echo "0")
            SKIPPED_COUNT=$(jq '.stats.skipped' playwright-report/test-results.json || echo "0")
            FLAKY_COUNT=$(jq '.stats.flaky' playwright-report/test-results.json || echo "0")

            # Ensure no null values
            TOTAL_COUNT=${TOTAL_COUNT:-0}
            PASSED_COUNT=${PASSED_COUNT:-0}
            FAILED_COUNT=${FAILED_COUNT:-0}
            SKIPPED_COUNT=${SKIPPED_COUNT:-0}
            FLAKY_COUNT=${FLAKY_COUNT:-0}

            # Set subject prefix based on test results
            if [ "$FAILED_COUNT" -eq 0 ]; then
              echo "status_emoji=✅" >> $GITHUB_OUTPUT
              echo "subject_prefix=SUCCESS" >> $GITHUB_OUTPUT
            else
              echo "status_emoji=❌" >> $GITHUB_OUTPUT
              echo "subject_prefix=FAILURE" >> $GITHUB_OUTPUT
            fi

            # Output test statistics for use in email
            echo "total=$TOTAL_COUNT" >> $GITHUB_OUTPUT
            echo "passed=$PASSED_COUNT" >> $GITHUB_OUTPUT
            echo "failed=$FAILED_COUNT" >> $GITHUB_OUTPUT
            echo "skipped=$SKIPPED_COUNT" >> $GITHUB_OUTPUT
            echo "flaky=$FLAKY_COUNT" >> $GITHUB_OUTPUT
          else
            # Fallback for missing test results file
            echo "subject_prefix=ERROR" >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "skipped=0" >> $GITHUB_OUTPUT
            echo "flaky=0" >> $GITHUB_OUTPUT
            echo "error_msg=Test Results Summary not found. Please check the GitHub Action run for details." >> $GITHUB_OUTPUT
          fi

      - name: Send Playwright report via email
        if: ${{ !cancelled() && github.event_name != 'pull_request' && steps.get-test-stats.outputs.total != 0 }}
        uses: dawidd6/action-send-mail@v16
        with:
          server_address: ${{ secrets.SMTP_MAIL_SERVER }}
          server_port: ${{ secrets.SMTP_MAIL_SERVER_PORT }}
          username: ${{ vars.NOTIFICATION_EMAIL }}
          password: ${{ secrets.DUMMY_PASSWORD }}
          to: ${{ vars.NOTIFICATION_EMAIL }}
          from: ${{ vars.NOTIFICATION_EMAIL }}
          subject: '${{ steps.get-test-stats.outputs.subject_prefix }}: Playwright Test Report'
          body: |
            ${{ steps.get-test-stats.outputs.status_emoji || '' }} Test Results Summary for ${{ github.server_url }}/${{ github.repository }}:

            Total Tests: ${{ steps.get-test-stats.outputs.total }}
            Passed: ${{ steps.get-test-stats.outputs.passed }}
            Failed: ${{ steps.get-test-stats.outputs.failed }}
            Skipped: ${{ steps.get-test-stats.outputs.skipped }}
            Flaky: ${{ steps.get-test-stats.outputs.flaky }}

            PRACTICE_E2E_URL=${{ env.PRACTICE_E2E_URL }}
            PRACTICE_API_URL=${{ env.PRACTICE_API_URL }}

            View full report: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            The test artifacts are available directly in the GitHub Actions run.

            ${{ steps.get-test-stats.outputs.error_msg || '' }}
      - name: Send Playwright error notification
        if: ${{ !cancelled() && github.event_name != 'pull_request' && steps.get-test-stats.outputs.total == 0 }}
        uses: dawidd6/action-send-mail@v16
        with:
          server_address: ${{ secrets.SMTP_MAIL_SERVER }}
          server_port: ${{ secrets.SMTP_MAIL_SERVER_PORT }}
          username: ${{ vars.NOTIFICATION_EMAIL }}
          password: ${{ secrets.DUMMY_PASSWORD }}
          to: ${{ vars.NOTIFICATION_EMAIL }}
          from: ${{ vars.NOTIFICATION_EMAIL }}
          subject: '${{ steps.get-test-stats.outputs.subject_prefix }}: Playwright Test Report'
          body: |
            An error was thrown while generating the test results summary for ${{ github.server_url }}/${{ github.repository }}.
            Please check the GitHub Action run for details.
            View full run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  test-visual:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    env:
      HOME: /root
      PRACTICE_E2E_URL: ${{ inputs.environment || 'https://bonigarcia.dev/selenium-webdriver-java' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run visual regression tests
        run: npx playwright test tests/e2e/chapter0-visual-regression-tests.spec.ts
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: visual-regression-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      - name: Install jq
        if: ${{ !cancelled() }}
        run: apt-get update -y && apt-get install -y jq

      # Email reporting directly from JSON output using direct calculations
      - name: Generate visual test statistics
        id: get-visual-test-stats
        if: ${{ !cancelled() }}
        run: |
          if [ -f "playwright-report/test-results.json" ]; then
            TOTAL_COUNT=$(jq '.stats | .expected + .skipped + .unexpected + .flaky' playwright-report/test-results.json || echo "0")
            PASSED_COUNT=$(jq '.stats.expected' playwright-report/test-results.json || echo "0")
            FAILED_COUNT=$(jq '.stats.unexpected' playwright-report/test-results.json || echo "0")
            SKIPPED_COUNT=$(jq '.stats.skipped' playwright-report/test-results.json || echo "0")
            FLAKY_COUNT=$(jq '.stats.flaky' playwright-report/test-results.json || echo "0")

            # Ensure no null values
            TOTAL_COUNT=${TOTAL_COUNT:-0}
            PASSED_COUNT=${PASSED_COUNT:-0}
            FAILED_COUNT=${FAILED_COUNT:-0}
            SKIPPED_COUNT=${SKIPPED_COUNT:-0}
            FLAKY_COUNT=${FLAKY_COUNT:-0}

            # Set subject prefix based on test results
            if [ "$FAILED_COUNT" -eq 0 ]; then
              echo "status_emoji=✅" >> $GITHUB_OUTPUT
              echo "subject_prefix=SUCCESS" >> $GITHUB_OUTPUT
            else
              echo "status_emoji=❌" >> $GITHUB_OUTPUT
              echo "subject_prefix=FAILURE" >> $GITHUB_OUTPUT
            fi

            # Output test statistics for use in email
            echo "total=$TOTAL_COUNT" >> $GITHUB_OUTPUT
            echo "passed=$PASSED_COUNT" >> $GITHUB_OUTPUT
            echo "failed=$FAILED_COUNT" >> $GITHUB_OUTPUT
            echo "skipped=$SKIPPED_COUNT" >> $GITHUB_OUTPUT
            echo "flaky=$FLAKY_COUNT" >> $GITHUB_OUTPUT
          else
            # Fallback for missing test results file
            echo "subject_prefix=ERROR" >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "skipped=0" >> $GITHUB_OUTPUT
            echo "flaky=0" >> $GITHUB_OUTPUT
            echo "error_msg=Test Results Summary not found. Please check the GitHub Action run for details." >> $GITHUB_OUTPUT
          fi

      - name: Send visual regression report via email
        if: ${{ !cancelled() && github.event_name != 'pull_request' && steps.get-visual-test-stats.outputs.total != 0 }}
        uses: dawidd6/action-send-mail@v16
        with:
          server_address: ${{ secrets.SMTP_MAIL_SERVER }}
          server_port: ${{ secrets.SMTP_MAIL_SERVER_PORT }}
          username: ${{ vars.NOTIFICATION_EMAIL }}
          password: ${{ secrets.DUMMY_PASSWORD }}
          to: ${{ vars.NOTIFICATION_EMAIL }}
          from: ${{ vars.NOTIFICATION_EMAIL }}
          subject: '${{ steps.get-visual-test-stats.outputs.subject_prefix }}: Playwright Visual Regression Test Report'
          body: |
            ${{ steps.get-visual-test-stats.outputs.status_emoji || '' }} Test Results Summary for ${{ github.server_url }}/${{ github.repository }}:

            Total Tests: ${{ steps.get-visual-test-stats.outputs.total }}
            Passed: ${{ steps.get-visual-test-stats.outputs.passed }}
            Failed: ${{ steps.get-visual-test-stats.outputs.failed }}
            Skipped: ${{ steps.get-visual-test-stats.outputs.skipped }}
            Flaky: ${{ steps.get-visual-test-stats.outputs.flaky }}

            PRACTICE_E2E_URL=${{ env.PRACTICE_E2E_URL }}

            View full report: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            The test artifacts are available directly in the GitHub Actions run.

            ${{ steps.get-visual-test-stats.outputs.error_msg || '' }}
      - name: Send visual regression error notification
        if: ${{ !cancelled() && github.event_name != 'pull_request' && steps.get-visual-test-stats.outputs.total == 0 }}
        uses: dawidd6/action-send-mail@v16
        with:
          server_address: ${{ secrets.SMTP_MAIL_SERVER }}
          server_port: ${{ secrets.SMTP_MAIL_SERVER_PORT }}
          username: ${{ vars.NOTIFICATION_EMAIL }}
          password: ${{ secrets.DUMMY_PASSWORD }}
          to: ${{ vars.NOTIFICATION_EMAIL }}
          from: ${{ vars.NOTIFICATION_EMAIL }}
          subject: '${{ steps.get-visual-test-stats.outputs.subject_prefix }}: Playwright Visual Regression Test Report'
          body: |
            An error was thrown while generating the test results summary for ${{ github.server_url }}/${{ github.repository }}.
            Please check the GitHub Action run for details.
            View full run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

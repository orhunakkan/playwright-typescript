name: Playwright Tests

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Weekdays at 06:00 UTC — smoke + critical tags only
    - cron: '0 6 * * 1-5'
  workflow_dispatch:
    inputs:
      environment:
        description: 'E2E base URL to test'
        required: false
        default: 'https://bonigarcia.dev/selenium-webdriver-java'
        type: string
      api_url:
        description: 'API base URL to test'
        required: false
        default: 'https://practice.expandtesting.com/notes/api'
        type: string
      test_env:
        description: 'Environment name (dev | staging | prod)'
        required: false
        default: 'dev'
        type: string
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      api_url:
        required: false
        default: 'https://practice.expandtesting.com/notes/api'
        type: string
      test_env:
        description: 'Environment name (dev | staging | prod)'
        required: false
        default: 'dev'
        type: string

# ─────────────────────────────────────────────────────────────────────────────
# Least-privilege token — no job in this workflow writes to the repo
# ─────────────────────────────────────────────────────────────────────────────
permissions:
  contents: read

# ─────────────────────────────────────────────────────────────────────────────
# Shared environment
# ─────────────────────────────────────────────────────────────────────────────
env:
  PRACTICE_E2E_URL: ${{ inputs.environment || 'https://bonigarcia.dev/selenium-webdriver-java' }}
  PRACTICE_API_URL: ${{ inputs.api_url || 'https://practice.expandtesting.com/notes/api' }}
  TEST_ENV: ${{ inputs.test_env || 'dev' }}
  # SauceDemo is a public practice site — no secret required.
  # config/env.ts calls requireEnv('SAUCE_DEMO_URL') at import time, so
  # every job that loads a page object needs this to be present.
  SAUCE_DEMO_URL: 'https://www.saucedemo.com'
  # Opt into Node.js 24 for all actions — suppresses the Node.js 20
  # deprecation warning across every job without requiring version bumps.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel in-flight runs for the same branch/PR when a new commit arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Reusable browser-cache step (referenced in each job that needs browsers)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # API Tests
  # No browser required — uses Playwright's request fixture only.
  # ───────────────────────────────────────────────────────────────────────────
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npx playwright test --project="API Tests"

      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: api-report
          path: playwright-report/
          retention-days: 14

      - name: Send API test report
        if: ${{ !cancelled() && github.event_name != 'pull_request' }}
        uses: ./.github/actions/send-test-report
        with:
          suite: 'API'
          smtp_server: ${{ secrets.SMTP_MAIL_SERVER }}
          smtp_port: ${{ secrets.SMTP_MAIL_SERVER_PORT }}
          email: ${{ vars.NOTIFICATION_EMAIL }}
          password: ${{ secrets.DUMMY_PASSWORD }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          repo: ${{ github.server_url }}/${{ github.repository }}
          trigger: ${{ github.event_name }}
          branch: ${{ github.ref_name }}
          api_url: ${{ env.PRACTICE_API_URL }}

  # ───────────────────────────────────────────────────────────────────────────
  # Desktop E2E — Chrome · Firefox · Edge
  #
  # Uses directory-level targeting (tests/e2e/) so new spec files are picked
  # up automatically. mobile-testing.spec.ts self-skips via
  # test.skip(!isMobile) on desktop projects — no noise, no missed coverage.
  #
  # On the nightly schedule only @smoke|@critical tests run to keep the
  # feedback loop short; push/PR runs the full suite.
  # ───────────────────────────────────────────────────────────────────────────
  test-web:
    name: Desktop E2E (Chrome · Firefox · Edge)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ hashFiles('package-lock.json') }}
          # Fall back to the most recent browser cache on a package-lock change
          restore-keys: |
            playwright-browsers-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run desktop E2E tests
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            npx playwright test tests/e2e/ \
              --project="Desktop Chrome" \
              --project="Desktop Firefox" \
              --project="Desktop Edge" \
              --grep "@smoke|@critical"
          else
            npx playwright test tests/e2e/ \
              --project="Desktop Chrome" \
              --project="Desktop Firefox" \
              --project="Desktop Edge"
          fi

      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: web-report
          path: playwright-report/
          retention-days: 14

      - name: Send desktop E2E report
        if: ${{ !cancelled() && github.event_name != 'pull_request' }}
        uses: ./.github/actions/send-test-report
        with:
          suite: 'Desktop E2E'
          smtp_server: ${{ secrets.SMTP_MAIL_SERVER }}
          smtp_port: ${{ secrets.SMTP_MAIL_SERVER_PORT }}
          email: ${{ vars.NOTIFICATION_EMAIL }}
          password: ${{ secrets.DUMMY_PASSWORD }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          repo: ${{ github.server_url }}/${{ github.repository }}
          trigger: ${{ github.event_name }}
          branch: ${{ github.ref_name }}
          e2e_url: ${{ env.PRACTICE_E2E_URL }}
          api_url: ${{ env.PRACTICE_API_URL }}

  # ───────────────────────────────────────────────────────────────────────────
  # Mobile E2E — Mobile Safari (iPhone 15 Pro Max) · Mobile Chrome (Pixel 7)
  #
  # Directory targeting also picks up mobile-testing.spec.ts, which was
  # previously missing from the explicit file list. Tests in that file
  # use test.skip(!isMobile) so they are correctly skipped on desktop
  # projects and actually execute here.
  # ───────────────────────────────────────────────────────────────────────────
  test-mobile:
    name: Mobile E2E (Safari · Chrome)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-browsers-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run mobile E2E tests
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            npx playwright test tests/e2e/ \
              --project="Mobile Safari" \
              --project="Mobile Chrome" \
              --grep "@smoke|@critical"
          else
            npx playwright test tests/e2e/ \
              --project="Mobile Safari" \
              --project="Mobile Chrome"
          fi

      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: mobile-report
          path: playwright-report/
          retention-days: 14

      - name: Send mobile E2E report
        if: ${{ !cancelled() && github.event_name != 'pull_request' }}
        uses: ./.github/actions/send-test-report
        with:
          suite: 'Mobile E2E'
          smtp_server: ${{ secrets.SMTP_MAIL_SERVER }}
          smtp_port: ${{ secrets.SMTP_MAIL_SERVER_PORT }}
          email: ${{ vars.NOTIFICATION_EMAIL }}
          password: ${{ secrets.DUMMY_PASSWORD }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          repo: ${{ github.server_url }}/${{ github.repository }}
          trigger: ${{ github.event_name }}
          branch: ${{ github.ref_name }}
          e2e_url: ${{ env.PRACTICE_E2E_URL }}

  # ───────────────────────────────────────────────────────────────────────────
  # Visual Regression
  # Runs inside the official Playwright Docker image to guarantee
  # pixel-identical font rendering across machines and CI agents.
  #
  # --with-deps is omitted because the Docker image already ships all system
  # libraries. The install command itself must still run so that Playwright's
  # runtime can register the browser binary location in its internal registry
  # — it verifies the files are present on disk and exits fast, no download.
  #
  # Keep the image tag in sync with the @playwright/test version in
  # package.json — a mismatch produces baseline drift.
  # ───────────────────────────────────────────────────────────────────────────
  test-visual:
    name: Visual Regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
        run: npm ci

      # Registers the browser binary location — skips download since the
      # Docker image already has all browsers present on disk.
      - name: Register Playwright browser
        run: npx playwright install chromium

      - name: Run visual regression tests
        run: npx playwright test tests/visual-regression/ --project="Visual Regression"

      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: visual-regression-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      # jq is not pre-installed in the Playwright Docker image
      - name: Install jq
        if: ${{ !cancelled() }}
        run: apt-get update -y && apt-get install -y jq

      - name: Send visual regression report
        if: ${{ !cancelled() && github.event_name != 'pull_request' }}
        uses: ./.github/actions/send-test-report
        with:
          suite: 'Visual Regression'
          smtp_server: ${{ secrets.SMTP_MAIL_SERVER }}
          smtp_port: ${{ secrets.SMTP_MAIL_SERVER_PORT }}
          email: ${{ vars.NOTIFICATION_EMAIL }}
          password: ${{ secrets.DUMMY_PASSWORD }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          repo: ${{ github.server_url }}/${{ github.repository }}
          trigger: ${{ github.event_name }}
          branch: ${{ github.ref_name }}
          e2e_url: ${{ env.PRACTICE_E2E_URL }}

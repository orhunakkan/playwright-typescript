name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: e2e (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # All four config projects resolve to bundled browsers
        # (Edge → chromium, Safari → webkit), so no branded channels are needed.
        project: ['Desktop Chrome', 'Desktop Firefox', 'Desktop Edge', 'Desktop Safari']
    env:
      # .env is gitignored; provide BASE_URL via repo variable with a sane default.
      BASE_URL: ${{ vars.BASE_URL || 'https://stagecraftlabs.com' }}
      CI: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run Playwright tests
        run: npx playwright test --project="${{ matrix.project }}"

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

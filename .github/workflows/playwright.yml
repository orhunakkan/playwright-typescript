name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: e2e (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: 'Desktop Chrome'
            browser: chromium
          - project: 'Desktop Firefox'
            browser: firefox
          - project: 'Desktop Edge'
            browser: chromium
          - project: 'Desktop Safari'
            browser: webkit
    env:
      BASE_URL: ${{ vars.BASE_URL }}
      CI: 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Determine test scope
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          PATH_ARG=""
          if [ "$EVENT_NAME" = "pull_request" ] && [[ "$HEAD_REF" == stlc/* ]]; then
            LAB="${HEAD_REF#stlc/}"
            if [ -d "tests/$LAB" ]; then
              PATH_ARG="tests/$LAB"
            fi
          fi
          echo "path=$PATH_ARG" >> "$GITHUB_OUTPUT"

      - name: Run Playwright tests
        # PRs from an stlc/<lab-name> branch scope the run to that lab's spec only, for fast
        # feedback; pushes to main (post-merge) and other branches run the full suite.
        # A lab-scoped run can legitimately match zero tests for a project when that lab is
        # intentionally excluded from a browser via a project-level testIgnore (e.g. TAB1-53 —
        # Service Workers is excluded from Desktop Safari) — treated as a no-op success, not a
        # failure, rather than letting Playwright's "No tests found" error fail the job.
        env:
          PROJECT: ${{ matrix.project }}
          SCOPE_PATH: ${{ steps.scope.outputs.path }}
        run: |
          if [ -n "$SCOPE_PATH" ]; then
            set +e
            LIST_OUTPUT=$(npx playwright test --project="$PROJECT" "$SCOPE_PATH" --list 2>&1)
            set -e
            if echo "$LIST_OUTPUT" | grep -q "^Total: 0 tests"; then
              echo "No tests for '$SCOPE_PATH' on project '$PROJECT' — intentionally out of scope. Skipping."
              exit 0
            fi
          fi
          npx playwright test --project="$PROJECT" $SCOPE_PATH

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.project }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          # A lab intentionally excluded from this project (e.g. Service Workers on Desktop
          # Safari, TAB1-53) never runs Playwright, so no report exists — expected, not an error.
          if-no-files-found: ignore

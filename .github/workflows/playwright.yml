name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: e2e (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: 'Desktop Chrome'
            browser: chromium
          - project: 'Desktop Firefox'
            browser: firefox
          - project: 'Desktop Edge'
            browser: chromium
          - project: 'Desktop Safari'
            browser: webkit
    env:
      BASE_URL: ${{ vars.BASE_URL }}
      CI: 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Determine test scope
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          PATH_ARG=""
          if [ "$EVENT_NAME" = "pull_request" ] && [[ "$HEAD_REF" == stlc/* ]]; then
            LAB="${HEAD_REF#stlc/}"
            if [ -d "tests/$LAB" ]; then
              PATH_ARG="tests/$LAB"
            fi
          fi
          echo "path=$PATH_ARG" >> "$GITHUB_OUTPUT"

      - name: Run Playwright tests
        # tests/scrapper is excluded on CI via testIgnore in playwright.config.ts (CI-only).
        # PRs from an stlc/<lab-name> branch scope the run to that lab's spec only, for fast
        # feedback; pushes to main (post-merge) and other branches run the full suite.
        env:
          PROJECT: ${{ matrix.project }}
          SCOPE_PATH: ${{ steps.scope.outputs.path }}
        run: npx playwright test --project="$PROJECT" $SCOPE_PATH

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.project }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

name: Playwright Docs Link Monitoring

on:
  schedule:
    # Every day at 06:00 CST (12:00 UTC)
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-docs-monitoring:
    name: Playwright Docs Link Monitoring
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-browsers-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Docs Link Monitoring
        run: npx playwright test tests/pw-documents/ --project="Desktop Chrome" --workers=1

      - name: Upload docs monitoring artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: docs-monitoring-report
          path: |
            playwright-report/
            PW-DOCS-CHECK.md
          retention-days: 14

      - name: Check for failure report
        id: report
        if: ${{ !cancelled() }}
        run: |
          if [ -f "PW-DOCS-CHECK.md" ]; then
            echo "has_failures=true" >> $GITHUB_OUTPUT
          else
            echo "has_failures=false" >> $GITHUB_OUTPUT
          fi

      - name: Set email subject
        id: subject
        if: ${{ !cancelled() }}
        run: |
          if [ "${{ steps.report.outputs.has_failures }}" = "true" ]; then
            echo "value=❌ FAILURES: Playwright Docs Monitoring" >> $GITHUB_OUTPUT
          else
            echo "value=✅ ALL CLEAR: Playwright Docs Monitoring" >> $GITHUB_OUTPUT
          fi

      - name: Send docs monitoring report
        if: ${{ !cancelled() }}
        uses: dawidd6/action-send-mail@v16
        with:
          server_address: ${{ secrets.SMTP_MAIL_SERVER }}
          server_port: ${{ secrets.SMTP_MAIL_SERVER_PORT }}
          username: ${{ vars.NOTIFICATION_EMAIL }}
          password: ${{ secrets.DUMMY_PASSWORD }}
          to: ${{ vars.NOTIFICATION_EMAIL }}
          from: ${{ vars.NOTIFICATION_EMAIL }}
          subject: ${{ steps.subject.outputs.value }}
          body: |
            Playwright Docs Link Monitoring — ${{ github.server_url }}/${{ github.repository }}

            Status: ${{ steps.report.outputs.has_failures == 'true' && 'Failures detected — PW-DOCS-CHECK.md attached' || 'All tests passed — no issues found' }}

            Trigger: ${{ github.event_name }} (${{ github.ref_name }})
            View run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Artifacts (full Playwright report): above run URL → Artifacts → docs-monitoring-report
          attachments: ${{ steps.report.outputs.has_failures == 'true' && 'PW-DOCS-CHECK.md' || '' }}
